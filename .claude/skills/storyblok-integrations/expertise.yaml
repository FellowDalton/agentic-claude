batch_operations:
  description: "Efficient bulk content operations"

  rate_limit_handling:
    code: |
      async function batchProcess<T>(
        items: T[],
        processor: (item: T) => Promise<void>,
        ratePerSecond = 3
      ) {
        const delay = 1000 / ratePerSecond

        for (const item of items) {
          await processor(item)
          await sleep(delay)
        }
      }

  bulk_publish:
    description: "Publish multiple stories"
    approach: "Queue with rate limiting"
    note: "No bulk publish endpoint, must iterate"

  bulk_update:
    description: "Update multiple stories"
    approach: "Batch with error handling and retry"

error_handling:
  api_errors:
    401: "Invalid or expired token"
    404: "Story/resource not found"
    422: "Validation error in payload"
    429: "Rate limit exceeded"

  retry_strategy:
    code: |
      async function withRetry<T>(
        fn: () => Promise<T>,
        maxRetries = 3
      ): Promise<T> {
        for (let i = 0; i < maxRetries; i++) {
          try {
            return await fn()
          } catch (error: any) {
            if (error.response?.status === 429) {
              await sleep(Math.pow(2, i) * 1000)
              continue
            }
            throw error
          }
        }
        throw new Error('Max retries exceeded')
      }

best_practices:
  - "Always verify webhook signatures"
  - "Implement idempotent sync operations"
  - "Use external_id fields to track source records"
  - "Log all API operations for debugging"
  - "Handle rate limits with exponential backoff"
  - "Queue bulk operations, don't process inline"
  - "Use draft version for sync, publish explicitly"
  - "Implement dead letter queue for failed syncs"

common_pitfalls:
  - "Not handling rate limits (429 errors)"
  - "Sync loops from bidirectional updates"
  - "Missing error handling in webhooks"
  - "Not using idempotent operations"
  - "Blocking webhook response with long operations"
  - "Not validating webhook signatures"

