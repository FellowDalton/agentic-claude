# Sprint Orchestrator Expertise
# ADW sprint orchestrator framework — sprint analysis, parallel track execution, worktree management, build/test/review isolation, and team coordination workflows
# Last validated: 2026-02-21

domain: sprint-orchestrator
purpose: ADW sprint orchestrator framework — sprint analysis, parallel track execution, worktree management, build/test/review isolation, and team coordination workflows

scope:
  - adws/ — Python ADW modules and CLI scripts
  - adws/adw_modules/ — Shared module library for all ADW workflows
  - .claude/scripts/ — Shell scripts for sprint monitoring and dispatch
  - .claude/orchestration/ — Workflow templates and workflow-to-team mappings
  - .claude/agents/ — Agent definitions (team agents, worktree launcher, BMAD)

core_patterns:
  sprint_orchestrator_pipeline:
    description: Main orchestration flow for parallel sprint execution
    entry_point: adws/adw_sprint_orchestrator.py
    runner: "uv run adw_sprint_orchestrator.py <sprint-status-file> [options]"
    dependencies: ["python-dotenv", "pydantic", "pyyaml"]
    workflow:
      - "1. Analyze sprint-status.yaml to find ready-for-dev stories"
      - "2. Match stories to workflows and build team compositions"
      - "3. Create git worktrees for parallel execution"
      - "4. Launch Claude sessions in iTerm tabs with /plan_w_team"
      - "5. Monitor completion and run human checkpoints"
      - "6. Optionally merge completed branches"
    cli_options:
      --dry-run: "Show what would be done without changes"
      --output-yaml: "Output SprintExecution YAML and exit"
      --launch-only: "Launch tracks, skip monitoring"
      --max-parallel: "Max parallel tracks (default 3)"
      --poll-interval: "Seconds between checks (default 30)"
      --yes: "Skip confirmation prompt"
      --auto-merge: "Auto-merge approved tracks"
      --tracks: "Run specific tracks (comma-separated)"
      --no-railway: "Skip Railway PR environment URLs"
      --no-teamwork: "Disable Teamwork integration"
      --no-create-pr: "Disable PR creation"
      --no-retrospective: "Skip BMAD Retrospective"
      --teammate-mode: "Agent Teams display mode: tmux|in-process|split-pane"

  isolated_workflow_pattern:
    description: Each ADW phase runs in isolation with its own entry point
    modules:
      adw_plan_iso.py:
        purpose: "Planning in isolated worktrees"
        usage: "uv run adw_plan_iso.py <issue-number> [adw-id]"
        steps:
          - "Fetch GitHub issue, create worktree, allocate ports"
          - "Classify issue type, create branch, generate plan"
          - "Commit plan, push, create/update PR"
      adw_build_iso.py:
        purpose: "Building in isolated worktrees"
        usage: "uv run adw_build_iso.py <issue-number> <adw-id>"
        requires: "adw_plan_iso.py must run first to create worktree and state"
        steps:
          - "Load state, validate worktree, find existing plan"
          - "Implement solution, commit, push, update PR"
      adw_test_iso.py:
        purpose: "Testing in isolated worktrees"
      adw_review_iso.py:
        purpose: "Code review in isolated worktrees"
      adw_plan_build_test_review_iso.py:
        purpose: "Full pipeline orchestration (plan+build+test+review)"
      adw_tea_atdd_iso.py:
        purpose: "ATDD workflow with test-first approach"
      adw_feedback_loop.py:
        purpose: "Iterative feedback and improvement cycle"

  sprint_types:
    description: Pydantic data models for sprint orchestration
    file: adws/adw_modules/sprint_types.py
    base_branch: "test"
    enums:
      TrackStatus: "pending | running | completed | blocked | failed | merged"
      StoryStatus: "backlog | ready-for-dev | in-progress | review | done"
    models:
      TeamMember:
        fields: "name, agent_type, expert_command, workflow, role, description, skills"
      StoryConfig:
        fields: "story_id, epic_id, status, file_path, dependencies, workflow"
        computed: "can_start (ready-for-dev AND no blocking deps)"
      WorkflowConfig:
        fields: "description, has_frontend, patterns, epics, orchestration"
      SprintTrack:
        fields: "story_id, story_display, branch, worktree_path, workflow, team, status"
      SprintExecution:
        fields: "project, max_parallel, tracks (dict of SprintTrack)"

  adw_modules_architecture:
    description: Shared module library powering all ADW workflows
    modules:
      state.py: "ADWState — persistent JSON state management per ADW session"
      git_ops.py: "Git operations — commit, branch, finalize (push + PR update)"
      github.py: "GitHub API — issue fetch, comments, PR creation, repo URL extraction"
      workflow_ops.py: "Workflow logic — classify issues, build plans, generate branches, commit formatting"
      worktree_ops.py: "Worktree lifecycle — create, validate, setup env, port management"
      worktree_manager.py: "Higher-level worktree + iTerm session management for sprints"
      track_monitor.py: "Completion detection, human checkpoints, branch merging"
      sprint_analyzer.py: "Sprint status parsing, workflow matching, team composition"
      port_registry.py: "Port allocation with file-based locking for parallel tracks"
      data_types.py: "Shared Pydantic models (GitHubIssue, IssueClassSlashCommand, etc.)"
      agent.py: "Agent template execution for automated workflows"
      personas.py: "Agent persona definitions (planner, implementor, reviewer)"
      railway_ops.py: "Railway deployment — push, PR environments, URL retrieval"
      teamwork_ops.py: "Teamwork.com integration — task updates, status sync"
      quality_gates.py: "Quality gate checks — test results, build status"
      issue_tracker.py: "Sprint issue tracking — blocking issues, severity filtering"
      bmad_integration.py: "BMAD retrospective integration"
      skill_eval.py: "Skill evaluation for agent assignments"
      r2_uploader.py: "Cloudflare R2 upload utility"
      utils.py: "Logging setup, environment checks"

  workflow_matching:
    description: Story-to-workflow matching via pattern keywords
    config_file: .claude/orchestration/workflows.yaml
    workflows:
      frontend-component:
        patterns: ["component", "storyblok", "blok", "accordion", "slider", "video", "faq"]
        epics: [2]
        has_frontend: true
      page-route:
        patterns: ["page", "route", "layout", "navigation", "catch-all", "middleware"]
        epics: [1, 3]
        has_frontend: true
      storyblok-setup:
        patterns: ["storyblok sdk", "visual editor", "preview", "webhook"]
        epics: [1]
        has_frontend: true
      content-migration:
        patterns: ["migration", "ibexa", "yaml", "import", "migrate", "asset"]
        epics: [4]
        has_frontend: false
      pim-integration:
        patterns: ["pim", "nextpage", "product", "sync", "category"]
        epics: [5]
        has_frontend: false
      search-algolia:
        patterns: ["algolia", "search", "index", "news", "seo"]
        epics: [6]
        has_frontend: true
      infrastructure:
        patterns: ["railway", "deploy", "redis", "cache", "ppr", "performance"]
        epics: [8, 9]
        has_frontend: false
      forms-compliance:
        patterns: ["form", "contact", "didomi", "cookie", "gdpr", "consent"]
        epics: [7]
        has_frontend: true
    default: frontend-component
    matching_rules: "Case-insensitive, first match wins, order matters"

  shell_scripts:
    description: Sprint infrastructure shell scripts
    scripts:
      dispatch-to-tab.sh:
        purpose: "Send commands to named iTerm tabs"
        location: .claude/scripts/dispatch-to-tab.sh
      sprint-monitor.sh:
        purpose: "Start orchestrator and tail execution log"
        location: .claude/scripts/sprint-monitor.sh
        options: ["--dry-run", "--tracks A,B,C", "--background", "--max-parallel N"]
      test-sprint.sh:
        purpose: "Test sprint workflow with a single story"
        location: .claude/scripts/test-sprint.sh
      track-watcher.sh:
        purpose: "Watch track completion and trigger next steps"
        location: .claude/scripts/track-watcher.sh

  team_agents:
    description: Agent definitions for team-based orchestration
    directory: .claude/agents/team/
    worktree_launcher:
      file: .claude/agents/worktree-launcher.md
      purpose: "Creates git worktrees and launches Claude sessions in iTerm tabs"
      persona: "Infrastructure specialist — setup only, no story analysis"
    bmad_agents:
      directory: .claude/agents/bmad/
      purpose: "BMAD methodology agents for structured development"

  orchestration_templates:
    description: Per-workflow team composition and task breakdown templates
    directory: .claude/orchestration/
    templates:
      - content-migration.md
      - forms-compliance.md
      - frontend-component.md
      - infrastructure.md
      - page-route.md
      - pim-integration.md
      - search-algolia.md
      - storyblok-setup.md

  worktree_management:
    description: Git worktree lifecycle for parallel track isolation
    creation: "adw_modules/worktree_ops.py — create_worktree()"
    port_allocation: "adw_modules/port_registry.py — file-based locking with TRACK_PORT_MAP"
    environment_setup: "Copy .env, install deps, configure ports per worktree"
    convention:
      worktree_parent: "/Users/dalton/projects/exhausto"
      worktree_prefix: "track"
      branch_pattern: "story/<story-id>"
    lifecycle:
      - "Create worktree from base branch (test)"
      - "Allocate unique ports (avoid conflicts between parallel tracks)"
      - "Copy gitignored files (.env, etc.) from main repo"
      - "Setup worktree environment (npm install, etc.)"
      - "Launch Claude session with /plan_w_team command"
      - "Monitor for completion markers"
      - "Deregister ports on cleanup"

  track_monitoring:
    description: How completion and status are detected
    file: adws/adw_modules/track_monitor.py
    completion_markers:
      - "ADW state file with completion status"
      - "Git commits on the branch"
      - "Build/test output files"
      - "Blocking issues in .sprint_issues"
    integrations:
      railway: "Push branch, get PR environment URL, cleanup on merge"
      teamwork: "Update task status on planning/build complete, PR created"
      github: "Create PRs, post issue comments"
      quality_gates: "Run tests, check build status before allowing merge"

