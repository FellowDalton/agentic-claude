best_practices:
  - "Always use --dry-run first to preview sprint execution before launching"
  - "Base branch for all worktree operations is 'test' (not main) — defined in sprint_types.py as BASE_BRANCH"
  - "Port allocation uses file-based locking (fcntl.flock) for multi-process safety — always pair with threading.Lock for intra-process safety"
  - "ADW state files persist across sessions — always check for existing state before creating new"
  - "Worktree environment setup must copy .env and other gitignored files from the main repo"
  - "Sprint monitor script defaults to _bmad-output/implementation-artifacts/sprint-status.yaml"
  - "Each ADW phase (plan, build, test, review) can run independently or as part of the full pipeline"
  - "Team composition is determined by workflow matching — workflows.yaml maps story patterns to orchestration templates"
  - "Track status transitions: pending -> running -> completed|blocked|failed -> merged"
  - "Blocking issues in .sprint_issues prevent track completion — resolve before proceeding"

portable_kit:
  description: Standalone Claude Code orchestrator kit (claude-orchestrator/)
  purpose: "Drop-in sprint orchestration for any project — no Python packages, no uv, no project-specific deps"
  directory: claude-orchestrator/
  key_changes_from_source:
    validators: "python3 shebang (#!/usr/bin/env python3) instead of uv run --script; no # /// script block"
    expert_pattern: "/skills:<domain>:plan_build_improve replaces /experts:<domain>:plan_build_improve"
    hook_commands: "python3 $CLAUDE_PROJECT_DIR/... replaces uv run $CLAUDE_PROJECT_DIR/..."
    codex_paths: ".claude/codex/ replaces adws/codex/"
    build_script: ".claude/scripts/run_build_session.sh replaces adws/run_build_session.sh"
    agent_glob: ".claude/agents/*-agent.md replaces .claude/agents/team/*.md"
    issue_tracker: "File-based JSONL (.sprint_issues) replaces uv run adws/cli/raise_issue.py"
    tts: "Optional — no hardcoded script path; projects add their own TTS or skip"
    validation_examples: "python3 -m py_compile replaces uv run python -m py_compile"
    package_install: "Generic 'install via your package manager' replaces uv add"
  ported_commands:
    plan.md: "Solo planning — minimal changes (removed uv add reference)"
    plan_w_team.md: "Team planning — 9 adaptations (hooks, experts->skills, paths, codex, build script, agents glob, removed project-specific refs)"
    build_w_team.md: "Team build — expert activation /skills:, sprint-reporter /skills:, optional TTS, file-based issue tracker"
  orchestration_commands:
    run-sprint.md:
      purpose: "Higher-order entry point — delegates to analyze/launch/monitor sub-commands"
      lines: 108
      flags: ["--dry-run", "--tracks", "--max-parallel", "--yes", "--launch-only", "--auto-merge", "--poll-interval", "--no-create-pr", "--teammate-mode"]
    analyze-sprint.md:
      purpose: "Phase 1 — read sprint-status.yaml, match workflows, build teams, assign ports"
      lines: 186
      replaces: "adws/adw_modules/sprint_analyzer.py + port_registry.py"
      port_table: "Inline lookup (track-a:3001/9101 through track-f:3006/9106) — no registry file"
    launch-tracks.md:
      purpose: "Phase 2 — create worktrees, copy .env, write .ports.env, launch iTerm tabs"
      lines: 209
      replaces: "adws/adw_modules/worktree_manager.py + worktree_ops.py"
      platform_note: "macOS iTerm via osascript; non-macOS falls back to manual CLI commands"
    monitor-tracks.md:
      purpose: "Phase 3 — poll .sprint_complete, create PRs via gh, human checkpoint, merge"
      lines: 215
      replaces: "adws/adw_modules/track_monitor.py"
      optional_deps: ["gh CLI for PR creation", "auto-merge via git merge --no-ff"]
    check-sprint.md:
      purpose: "Manual status check — find worktrees, read markers, display summary table"
      lines: 83
    cleanup-worktrees.md:
      purpose: "Remove sprint worktrees — git worktree remove + prune"
      lines: 70
  ported_skills:
    sprint-reporter:
      purpose: "Sprint completion report and voice guide generation"
      files: 10  # SKILL.md, expertise.yaml, question.md, plan.md, plan_build_improve.md, self-improve.md, self-improve.sh, consolidate.md, report.md, expertise.learnings.jsonl
      portable_changes: "Removed Storyblok/EXHAUSTO references, generic file categorization patterns, /skills: paths"
      invoked_by: "build_w_team.md Step 6.7 or standalone via /skills:sprint-reporter:report"
  portable_workflows:
    file: ".claude/orchestration/workflows.yaml"
    examples: ["frontend-component", "backend-api"]
    template: ".claude/orchestration/example-workflow.md"
    team_pattern: "test-writer/builder/validator using general-purpose agents with /skills: references"
  documentation:
    file: "CLAUDE.md"
    sections: ["Overview", "Quick Start", "Expert Skill System", "Commands Reference", "Sprint Status Format", "Workflow Configuration", "Sprint Execution Flow", "Port Allocation", "Plan Validation", "Portability Notes"]
  structure:
    - ".claude/commands/ — plan.md, plan_w_team.md, build_w_team.md + orchestration commands"
    - ".claude/hooks/validators/ — plan validators (python3, stdlib only)"
    - ".claude/scripts/ — build session wrapper"
    - ".claude/codex/ — review prompt and schema"
    - ".claude/orchestration/ — workflow templates (workflows.yaml + example-workflow.md)"
    - ".claude/skills/ — expert skills (sprint-reporter + create-expert-skill bootstrapper)"
    - ".claude/agents/ — agent wrappers (*-agent.md)"
    - ".claude/templates/ — skill and agent templates"
    - "specs/ — plan output directory"
    - "CLAUDE.md — setup and usage documentation"
  prerequisites: ["python3 (stdlib only)", "git", "claude CLI"]
  optional_deps: ["gh CLI (PR creation)", "codex CLI (plan review)", "iTerm/macOS (auto tab launch)"]
  validation_status:
    last_validated: "2026-02-21"
    total_files: 40
    all_checks_passed: true
    checks_run:
      - "No absolute paths (/Users/)"
      - "No adws/ references"
      - "No _bmad-output references"
      - "No uv run in commands/hooks"
      - "No /experts: in commands/hooks (all /skills:)"
      - "Python3 shebangs on all validators"
      - "All .py validators compile (py_compile)"
      - "Shell scripts executable"
      - "workflows.yaml valid YAML"
      - "run-sprint.md under 150 lines (108)"
      - "Sub-commands under 250 lines each"
      - "Sprint-reporter skill has all 10 files"
      - "Expert field regex matches validator pattern"
      - "All cross-references resolve (hooks, codex, scripts, skills, orchestration)"
      - "Smoke test: fixture sprint status traces correctly through analyze-sprint logic"

common_pitfalls:
  - "Running adw_build_iso.py without first running adw_plan_iso.py — build requires existing state and worktree"
  - "Forgetting to deregister ports when cleaning up worktrees — leads to port conflicts in subsequent sprints"
  - "Not checking for uncommitted changes before creating worktrees — orchestrator auto-commits but may include unintended files"
  - "Using main instead of test as base branch — sprint orchestrator creates worktrees from BASE_BRANCH which is 'test'"
  - "Ignoring --no-railway flag when Railway is not configured — causes errors during PR environment URL retrieval"
  - "Assuming all subprocess calls have timeouts — test_subprocess_timeouts.py validates this with AST analysis"
  - "Not handling the quality gate two-step pattern — step 1 generates checksum, step 2 requires --approve-report <checksum>"
  - "Modifying workflow patterns without updating the default fallback — unmatched stories fall through to frontend-component"
