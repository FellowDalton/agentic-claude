# ==========================================================================
# Key Files
# ==========================================================================

key_files:
  - path: apps/migration/src/cli.ts
    purpose: "CLI entry point with migrate, migrate-dk-leaf, migrate-dk-pages, migrate-dk-media-leaf, build-contentid-mapping, fix-folder-names, and build-node-mapping commands"
  - path: apps/migration/src/transformer/index.ts
    purpose: "Central transformer router — dispatches items by contentType"
  - path: apps/migration/src/reader/yaml-reader.ts
    purpose: "YAML parser — readYamlExport, buildFieldMap, getFieldValue"
  - path: apps/migration/src/writer/storyblok-writer.ts
    purpose: "Storyblok Management API writer — upsert, folder management"
  - path: apps/migration/src/writer/folder-manager.ts
    purpose: "Idempotent folder creation for Storyblok"
  - path: apps/migration/src/transformer/richtext.ts
    purpose: "XML richtext to Storyblok JSON conversion"
  - path: apps/migration/src/utils/asset-resolver.ts
    purpose: "Multi-strategy image resolution from Ibexa to Storyblok URLs"
  - path: apps/migration/src/utils/country.ts
    purpose: "Country config — VALID_COUNTRIES, getLangCode, getYamlPath"
  - path: apps/migration/src/utils/slug.ts
    purpose: "URL-safe slug generation"
  - path: apps/migration/src/types/ibexa.ts
    purpose: "TypeScript interfaces for Ibexa content items and field maps"
  - path: apps/migration/src/types/storyblok.ts
    purpose: "TypeScript interfaces for Storyblok payloads, ID mapping, asset types"
  - path: apps/migration/src/transformer/ezpage-parser.ts
    purpose: "Parse Ibexa ezpage blocks to Storyblok nestable bloks — 26 block type mappings"
  - path: apps/migration/src/transformer/reference-resolver.ts
    purpose: "Resolve Ibexa content IDs to Storyblok UUIDs via id-mapping + contentid-mapping"
  - path: apps/migration/src/transformer/folder-hierarchy.ts
    purpose: "Build location tree from folder items, resolve folder paths for page routing"
  - path: apps/migration/src/utils/contentid-mapper.ts
    purpose: "Parse CSV content ID source, validate uniqueness, cross-validate against id-mapping"
  - path: apps/migration/src/utils/nodeid-mapper.ts
    purpose: "Streaming SQL dump parser — extracts node_id -> contentobject_id from ezcontentobject_tree INSERT statements (handles 1.7GB+ files via readline)"
  - path: apps/migration/src/transformer/dk-leaf-migration.ts
    purpose: "DK leaf content migration — CMS-only filtering, header/footer full transforms"
  - path: apps/migration/src/validator/types.ts
    purpose: "Validation framework types — ValidationCheck, ValidationSection, ValidationReport, Validator, StoryblokStory, StoryblokFolder, ValidationOptions"
  - path: apps/migration/src/validator/storyblok-reader.ts
    purpose: "Read-only Storyblok API client with caching, pagination, rate limiting, retry"
  - path: apps/migration/src/validator/content-count-validator.ts
    purpose: "AC-1: Source vs destination content type count comparison"
  - path: apps/migration/src/validator/link-validator.ts
    purpose: "AC-2: Internal link integrity via dynamic UUID discovery and richtext walking"
  - path: apps/migration/src/validator/asset-validator.ts
    purpose: "AC-3: Asset URL reachability via HTTP HEAD with concurrency limiting"
  - path: apps/migration/src/validator/block-validator.ts
    purpose: "AC-4: Block completeness — ezpage source parsing vs Storyblok body comparison"
  - path: apps/migration/src/validator/seo-validator.ts
    purpose: "AC-5: SEO metadata completeness (novaseometas -> seo_title/seo_description)"
  - path: apps/migration/src/validator/folder-validator.ts
    purpose: "AC-6: Folder structure hierarchy validation"
  - path: apps/migration/src/validator/id-mapping-validator.ts
    purpose: "AC-7: ID mapping completeness with exhaustive UUID existence check"
  - path: apps/migration/src/validator/report-generator.ts
    purpose: "JSON and markdown report generation from ValidationReport"
  - path: apps/migration/src/validator/index.ts
    purpose: "Validation orchestrator — runs all 7 validators, aggregates report"
  - path: apps/migration/src/audit/country-schema-audit.ts
    purpose: "Cross-country schema audit — content type diff, block type diff, CMS inventory generation"

