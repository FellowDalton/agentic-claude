best_practices:
  - "Always use --dry-run first for migrations"
  - "Pull components before generating types"
  - "Store space ID in env var for consistency"
  - "Use --region flag matching your space's region"
  - "Keep .storyblok/ in version control for team sync"
  - "Generate types after every component schema change"
  - "Use separate spaces for dev/staging/prod"

common_pitfalls:
  - "Using Preview token instead of Personal Access Token for CLI"
  - "Forgetting --region flag (defaults may not match your space)"
  - "Running migrations without backup (always pull first)"
  - "Confusing stories (content) with components (schemas)"
  - "Not regenerating types after schema changes"
  - "Folder slugs must be URL-safe: Storyblok API returns 422 for unicode chars in slug field"
  - "Root-level folder listing: with_parent must be 0 (not undefined) to list only root stories"
  - "Home page with is_startpage=true may 422 if root story already exists in the space"
  - "migrate-dk-leaf OVERWRITES dk-id-mapping.json (not merge). Must re-run migrate-dk-pages + migrate-dk-media-leaf --merge-mapping after to rebuild full mapping."
  - "Footer column_links reference editorial_page items, not link items. buildInlineLinkBlok reads 'name' field from link items; editorial_pages use 'title'. Titles will be empty."
  - "Footer column2_links may be empty if they reference PIM categories not in CMS-only export."

environment_vars:
  STORYBLOK_PERSONAL_ACCESS_TOKEN: "For CLI authentication"
  STORYBLOK_TOKEN: "For SDK/API access (different from CLI)"
  STORYBLOK_REGION: "Space region (eu, us, cn, au)"
  STORYBLOK_SPACE_ID: "Target space ID"

file_structure:
  pulled_stories: ".storyblok/stories/<space_id>/<slug>_<uuid>.json"
  pulled_components: ".storyblok/components/<space_id>/components.json"
  migrations: ".storyblok/migrations/"
  rollbacks: ".storyblok/rollbacks/"
  generated_types: "storyblok-component-types.d.ts"

migration_workflow:
  description: "Safe content migration process"
  steps:
    - "Backup: Pull all stories and components"
    - "Generate migration: storyblok migrations generate <component>"
    - "Edit migration file in .storyblok/migrations/"
    - "Dry run: storyblok migrations run --dry-run"
    - "Execute: storyblok migrations run --publish published"
    - "Verify: Pull stories again and compare"

space_configuration:
  description: "CLI space setup and management"
  commands:
    list_spaces: "storyblok spaces list"
    space_info: "storyblok spaces info --space <id>"
  notes:
    - "Space configuration changes require Management API"
    - "CLI focuses on content and component operations"

pulled_story_json_structure:
  description: "Structure of story JSON files pulled via storyblok stories pull"
  root_level: true
  note: "Data is at ROOT level of JSON file (NOT nested under a 'story' key)"
  key_fields:
    slug: "URL slug segment"
    full_slug: "Full path from root (e.g. dk/section/page-name)"
    uuid: "Unique identifier"
    is_folder: "true for folder entries (no component, skip for content extraction)"
    content_component: "content.component -- type identifier (page, article, home, product, etc.)"
    content_body: "content.body -- array of blok objects (the page content)"
    meta_data: "meta_data.ibexa_remote_id, meta_data.ibexa_content_type"
  richtext_format: "TipTap doc format: {type: 'doc', content: [{type: 'paragraph', content: [{text: '...', type: 'text'}]}]}"
  richtext_field_names: ["content", "rigth_content", "introduction_richtext", "description", "intro"]
  image_formats:
    richtext_inline: "{type: 'image', attrs: {alt: '...', src: '//a.storyblok.com/f/SPACE/SIZE/HASH/FILENAME'}}"
    asset_field: "{fieldtype: 'asset', filename: '//a.storyblok.com/f/SPACE/SIZE/HASH/FILENAME', alt: '...'}"
    numeric_ref: "string number like '62681' -- unresolved Ibexa asset ID"
  link_formats:
    richtext_mark: "{type: 'link', attrs: {href: '...', target: '...', linktype: 'url'}}"
    multilink: "{fieldtype: 'multilink', linktype: 'story', cached_url: '...', _pending_relation: '...'}"
    uuid_ref: "Direct UUID string in fields like int_link"
    numeric_ref: "Numeric string in fields like cta_int_link_1"
  unresolved_links:
    ezlocation: "122 ezlocation:// references (Ibexa location IDs, not resolvable)"
    pending_relations: "multilink fields with _pending_relation numeric IDs"
  dk_component_distribution:
    page_types: "page(187), article(39), home(1)"
    leaf_types: "push_card(246), link(47), faq_item(29), key_facts_item(25), testimonial_item(23)"
    pim_types: "product(3), product_catagory(2) -- note misspelling"
    folders: "14 entries with is_folder=true"
    total: 623
  blok_types_in_body: ["richtext_block", "two_columns", "illustrated_benefits", "card_grid", "quick_actions", "faq_block", "button_cta", "photo_advantages", "centered_image", "video", "teaser", "contact_block", "contact_cta", "testimonial_block", "key_facts_block", "news_highlights", "spacer", "feature", "infographic", "grid", "form_embed", "custom_html", "multi_content", "social_carousel", "solution_components", "anchor_navigation", "logo_card_grid", "project_reference", "video_gallery"]
  pim_exclusion_note: "product_catagory (misspelling in Storyblok) vs product_category (corrected in transformer). Exclusion list must include BOTH spellings."
